[protected_paths]
# Cloud credentials
~/.aws/credentials
~/.aws/config
~/.azure/
~/.config/gcloud/

# Kubernetes
~/.kube/config
~/.kube/cache/

# SSH
~/.ssh/

# GPG / age / SOPS
~/.gnupg/
~/.config/sops/

# Password managers & vaults
~/.password-store/
~/.config/op/
~/.vault-token
~/.config/vault/

# Container registries
~/.docker/config.json
~/.config/helm/repositories.yaml

# Terraform
~/.terraform.d/credentials.tfrc.json
~/.terraformrc

# SCM tokens
~/.config/gh/hosts.yml
# ~/.gitconfig

# GitHub Actions / CI secrets
~/.config/github-copilot/
~/.config/hub

# General
~/.netrc
~/.env

[settings]
# TTL (seconds) granted when a user clicks Allow for an unknown process.
# Applies to user-approved accesses; [allowlist] entries have their own TTL.
user_ttl = 300

[allowlist]
# The allowlist is intentionally empty by default.
#
# Pre-allowlisting binaries is risky: a compromised or replaced binary at the
# same path would gain silent access to every protected resource.
# Add entries only for tools you have verified and trust explicitly.
#
# Format: /absolute/path/to/binary = ttl_seconds
#
# Examples (commented out — opt-in explicitly):
# /usr/bin/ssh            = 3600
# /usr/local/bin/aws      = 3600
# /usr/bin/kubectl        = 3600
# /usr/bin/terraform      = 3600
# /usr/bin/gpg            = 3600
# /usr/bin/git            = 3600
# /usr/bin/gh             = 3600
# /usr/local/bin/op       = 3600
# /usr/bin/vault          = 3600
# /usr/local/bin/helm     = 3600
# /usr/bin/docker         = 3600
